spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HRM-Hikari-Pool-Prod
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 30000
      max-lifetime: 1800000
      keepalive-time: 30000
      connection-timeout: 10000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://hrm.production.com}
  sms:
    provider-key: ${SMS_PROVIDER_KEY}
  external-api:
    gov-wage-url: ${GOV_WAGE_URL:https://api.gov/wage-rates}
    timeout-ms: 5000
