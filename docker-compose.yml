version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hrm_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hrm_db_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hrm-network

  redis:
    image: redis:7-alpine
    container_name: hrm_redis
    ports:
      - "6379:6379"
    networks:
      - hrm-network

  backend:
    build: ./backend
    container_name: hrm_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/hrm_db_staging
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=9a6763c3132646b0a0bb5c389814470bc65df4bcf54b1f58b73f88f00155b4129528bc41ff9197c38fc7d9c6d482c3c6f40b2f56b0632d4b9687e174780517be
      - SMS_PROVIDER_KEY=mock-sms-key-12345
      - GOV_WAGE_URL=https://api.mock.gov/wage-rates
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    networks:
      - hrm-network

  frontend:
    build: ./frontend
    container_name: hrm_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    networks:
      - hrm-network

volumes:
  postgres_data:

networks:
  hrm-network:
    driver: bridge
